name: CI
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print environmental variables
        run: printenv
      - name: Print full GitHub context
        run: echo '${{ toJson(github) }}'      
      - name: Github Reponame
        run: echo '${{ github.repository }}'
      - name: Github actor
        run: echo '${{ github.actor }}'
      - name: Github actor
        run: echo '${{ toJson(github.event.commits) }}'
